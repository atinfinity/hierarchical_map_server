global_lowres_map_server:
  ros__parameters:
    # Absolute path to the same tileset.yaml used by tile_map_server (overridden from launch)
    tileset_path: ""
    # Downsample factor. Must divide tile_size_cells.
    #   0.05m tiles -> 0.1m with factor 2, 0.2m with factor 4
    downsample_factor: 2
    # true (recommended): conservative max-pool (occupancy priority); walls are not lost by averaging.
    occupancy_priority: true
    topic_name: map_global_lowres
    global_frame: map
