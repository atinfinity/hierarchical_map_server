tile_map_server:
  ros__parameters:
    # Override tileset_path from launch at startup (pre-split map inside the package)
    tileset_path: ""
    window_size: 3            # 3x3 = 6 m square window (2 m tiles)
    hysteresis_m: 0.3         # For a small arena. Recenter roughly every ~2 m of travel
    update_period_s: 0.3
    global_frame: map
    robot_frame: base_footprint   # TB3 tf frame (matches amcl's base_frame_id)
    topic_name: map
    initial_window_center: [-2.0, -0.5]   # robot spawn position
    tile_cache_size: 25
