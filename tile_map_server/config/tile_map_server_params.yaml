tile_map_server:
  ros__parameters:
    # Absolute path to tileset.yaml (required)
    tileset_path: ""
    # Side length of the tile window to load (odd). 3 serves a 150 m square when tiles are 50 m
    window_size: 3
    # Recentering deadband [m]. Do not switch until moving past the tile boundary by this distance
    hysteresis_m: 5.0
    # Position-monitoring timer period [s]
    update_period_s: 0.5
    global_frame: map
    robot_frame: base_link
    topic_name: map
    # Center of the initial window to serve before tf is established [x, y] (m)
    initial_window_center: [0.0, 0.0]
    # Number of tiles retained in the LRU cache (lower bound auto-clamped to window_size*(window_size+1))
    tile_cache_size: 25
