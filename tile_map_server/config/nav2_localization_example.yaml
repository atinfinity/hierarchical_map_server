# Key points of the AMCL / global costmap settings when used together with tile_map_server (excerpt)
#
# Set node_names of lifecycle_manager_localization to
#   node_names: [tile_map_server, amcl]   # replaces map_server

amcl:
  ros__parameters:
    # Required: accept map topic updates (the map is replaced on every window recentering)
    first_map_only: false
    map_topic: map
    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_footprint
    set_initial_pose: false
    # Maximum distance of the likelihood field. Larger values make rebuilding on map updates heavier
    laser_likelihood_max_dist: 2.0

global_costmap:
  global_costmap:
    ros__parameters:
      global_frame: map
      robot_base_frame: base_link
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        # Required: subscribe to the transient_local /map and rebuild the costmap on every update
        map_subscribe_transient_local: true
        map_topic: map
